services:
  postgres:
    image: postgres:16-alpine
    container_name: multiuserchatbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: multiuserchatbot
      POSTGRES_PASSWORD: multiuserchatbot_password
      POSTGRES_DB: multiuserchatbot
    ports:
      - "5433:5432"
    volumes:
      - multiuserchatbot_postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiuserchatbot-app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env

volumes:
  multiuserchatbot_postgres_data: